<!DOCTYPE html>
<html lang="bn" data-theme="dark" data-lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisab Tracker Pro - Cloud Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg: #0b0e16; --bg2: #0f1320; --surface: #141929; --card: #1c243a; --border: #2e3a58;
    --text: #e4e8f5; --text2: #94a3b8; --muted: #64748b; --primary: #38bdf8;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --shadow: 0 10px 30px rgba(0,0,0,0.4);
}
[data-theme="light"] {
    --bg: #f1f5f9; --bg2: #ffffff; --surface: #ffffff; --card: #f8fafc; --border: #cbd5e1;
    --text: #0f172a; --text2: #475569; --muted: #94a3b8; --primary: #0ea5e9;
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, border-color 0.3s; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Hind Siliguri', sans-serif; line-height: 1.6; font-size: 16px; }

[data-lang="bn"] .en { display: none !important; }
[data-lang="en"] .bn { display: none !important; }

/* --- HEADER --- */
.hdr {
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 10px 20px; min-height: 70px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
    flex-wrap: wrap; gap: 10px;
}
.logo-name { font-size: 1.2rem; font-weight: 800; color: var(--primary); white-space: nowrap; }
.hdr-right { display: flex; gap: 8px; flex-wrap: wrap; }
.ctrl-btn {
    height: 38px; padding: 0 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 13px;
    font-weight: 600; display: flex; align-items: center; gap: 5px;
}

.wrap { max-width: 900px; margin: 0 auto; padding: 20px; }

/* --- SUMMARY --- */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
.sc { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; text-align: center; box-shadow: var(--shadow); }
.sc-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
.sc-val { font-size: 28px; font-weight: 800; }
.sc-val.g { color: var(--green); } .sc-val.r { color: var(--red); } .sc-val.y { color: var(--yellow); }

/* --- TABS --- */
.tabs { display: flex; gap: 8px; background: var(--bg2); padding: 6px; border-radius: 14px; margin-bottom: 25px; border: 1px solid var(--border); overflow-x: auto; }
.tab { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--muted); background: transparent; white-space: nowrap; }
.tab.on { background: var(--surface); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

/* --- FORMS --- */
.af { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.af-head { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; }
.af-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 15px; }
input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg2); color: var(--text); font-size: 15px; outline: none; }

.quick-notes { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
.q-tag { font-size: 12px; padding: 6px 12px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); cursor: pointer; font-weight: 600; color: var(--text2); }

.sbtn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; color: white; }
.sbtn-g { background: linear-gradient(135deg, var(--green), #059669); }
.sbtn-r { background: linear-gradient(135deg, var(--red), #dc2626); }

/* --- CARDS --- */
.pcard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.pt { padding: 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.pname { font-size: 1.1rem; font-weight: 700; }
.pamount { font-size: 1.3rem; font-weight: 800; }
.pbody { display: none; border-top: 1px solid var(--border); background: var(--bg2); padding: 15px; }
.pbody.on { display: block; }
.hi { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text2); }

.arow { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
.btn-act { flex: 1; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; }

/* --- MODALS --- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 15px; }
.overlay.on { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); padding: 12px 24px; border-radius: 50px; border: 1px solid var(--primary); transition: 0.4s; z-index: 3000; }
.toast.on { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="hdr">
  <div class="logo-name">
    <span class="bn">হিসাব ট্র্যাকার Pro</span>
    <span class="en">Hisab Tracker Pro</span>
  </div>
  <div class="hdr-right">
    <button class="ctrl-btn" onclick="toggleLang()">🌐 <span class="bn">EN</span><span class="en">বাং</span></button>
    <button class="ctrl-btn" onclick="exportData()">💾 <span class="bn">ব্যাকআপ</span><span class="en">Backup</span></button>
    <button class="ctrl-btn" onclick="triggerImport()">📂 <span class="bn">রিস্টোর</span><span class="en">Restore</span></button>
    <button class="ctrl-btn" onclick="toggleTheme()">🌓</button>
  </div>
</header>

<input type="file" id="importFile" style="display:none" accept=".json" onchange="handleImport(event)">

<div class="wrap">
  <div class="summary">
    <div class="sc">
      <div class="sc-lbl bn">আমি পাবো</div><div class="sc-lbl en">I Receive</div>
      <div class="sc-val g" id="sv-r">৳০</div>
    </div>
    <div class="sc">
      <div class="sc-lbl bn">আমি দেবো</div><div class="sc-lbl en">I Owe</div>
      <div class="sc-val r" id="sv-g">৳০</div>
    </div>
    <div class="sc">
      <div class="sc-lbl bn">নিট ব্যালেন্স</div><div class="sc-lbl en">Net Balance</div>
      <div class="sc-val y" id="sv-n">৳০</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('r')">📥 <span class="bn">পাওনা</span><span class="en">Receivable</span></button>
    <button class="tab" onclick="switchTab('g')">📤 <span class="bn">দেনা</span><span class="en">Payable</span></button>
    <button class="tab" onclick="switchTab('a')">📋 <span class="bn">সব রেকর্ড</span><span class="en">All Records</span></button>
  </div>

  <div class="sec on" id="sec-r">
    <div class="af">
      <div class="af-head">✚ <span class="bn">নতুন পাওনা</span><span class="en">Add Receivable</span></div>
      <div class="af-row">
        <input id="r-n" type="text" placeholder="নাম / Name">
        <input id="r-a" type="number" placeholder="পরিমাণ / Amount">
        <input id="r-no" type="text" placeholder="নোট / Note">
      </div>
      <div class="quick-notes">
        <span class="q-tag" onclick="setQuickNote('Hawlat', 'r-no')">Hawlat</span>
        <span class="q-tag" onclick="setQuickNote('Recharge', 'r-no')">Recharge</span>
        <span class="q-tag" onclick="setQuickNote('Send Money', 'r-no')">Send Money</span>
      </div>
      <button class="sbtn sbtn-g" onclick="addEntry('receive')">
          <span class="bn">যোগ করুন →</span><span class="en">Add Entry →</span>
      </button>
    </div>
    <div id="lst-r"></div>
  </div>

  <div class="sec" id="sec-g" style="display:none">
    <div class="af">
      <div class="af-head">✚ <span class="bn">নতুন দেনা</span><span class="en">Add Payable</span></div>
      <div class="af-row">
        <input id="g-n" type="text" placeholder="নাম / Name">
        <input id="g-a" type="number" placeholder="পরিমাণ / Amount">
        <input id="g-no" type="text" placeholder="নোট / Note">
      </div>
      <div class="quick-notes">
        <span class="q-tag" onclick="setQuickNote('Borrowed', 'g-no')">Borrowed</span>
        <span class="q-tag" onclick="setQuickNote('Recharge', 'g-no')">Recharge</span>
      </div>
      <button class="sbtn sbtn-r" onclick="addEntry('give')">
          <span class="bn">যোগ করুন →</span><span class="en">Add Entry →</span>
      </button>
    </div>
    <div id="lst-g"></div>
  </div>

  <div class="sec" id="sec-a" style="display:none"><div id="lst-a"></div></div>
</div>

<div class="overlay" id="m-pay">
  <div class="modal">
    <div style="font-weight:700; margin-bottom:10px;">💸 <span class="bn">পরিশোধ রেকর্ড</span><span class="en">Record Payment</span></div>
    <div id="m-pay-sub" style="font-size:14px; margin-bottom:15px; color:var(--muted)"></div>
    <input id="pa" type="number" placeholder="পরিমাণ / Amount" style="margin-bottom:10px;">
    <input id="pn" type="text" placeholder="নোট / Note">
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-act" style="flex:1" onclick="cm('m-pay')">Cancel</button>
        <button class="sbtn sbtn-g" style="flex:1.5" onclick="confirmPay()">Confirm</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-add">
  <div class="modal">
    <div style="font-weight:700; margin-bottom:10px;">➕ <span class="bn">আরো টাকা যোগ</span><span class="en">Add More</span></div>
    <div id="m-add-sub" style="font-size:14px; margin-bottom:15px; color:var(--muted)"></div>
    <input id="aa" type="number" placeholder="পরিমাণ / Amount" style="margin-bottom:10px;">
    <input id="an" type="text" placeholder="নোট / Note">
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-act" style="flex:1" onclick="cm('m-add')">Cancel</button>
        <button class="sbtn sbtn-g" style="flex:1.5" onclick="confirmAddMore()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- CONFIG ---
const supabaseUrl = 'https://hmqckyecenigcjikfjob.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtcWNreWVjZW5pZ2NqaWtmam9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzUzMDMsImV4cCI6MjA5MjUxMTMwM30.1pyoIp6-GegOVERyroNm0MlkPe4VOAiBL-bU-iJP2gU';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let DB = { receive: [], give: [] };
let LANG = localStorage.getItem('hisab_lang') || 'bn';
let THEME = localStorage.getItem('hisab_theme') || 'dark';
let TAB = 'r'; let CTX = {};

// --- INITIALIZE SETTINGS ---
document.documentElement.setAttribute('data-lang', LANG);
document.documentElement.setAttribute('data-theme', THEME);

// --- SYNC ENGINE ---
async function cloudSave() {
    const { error } = await supabaseClient.from('hisab_data').upsert({ id: 1, data: DB });
    if (error) console.error("Cloud Save Error:", error);
}

async function cloudLoad() {
    try {
        const { data, error } = await supabaseClient.from('hisab_data').select('data').eq('id', 1).maybeSingle();
        if (data && data.data) {
            DB = data.data;
            render();
            toast(LANG === 'bn' ? "✅ ক্লাউড থেকে সিঙ্ক হয়েছে!" : "✅ Synced from Cloud!");
        } else {
            const local = localStorage.getItem('hisab_v5');
            if(local) { DB = JSON.parse(local); render(); }
            toast(LANG === 'bn' ? "⚠️ লোকাল ডেটা লোড হয়েছে" : "⚠️ Loaded local data");
        }
    } catch (e) {
        console.error("Load Error:", e);
    }
}

function save() { 
    localStorage.setItem('hisab_v5', JSON.stringify(DB));
    cloudSave();
}

// --- UI HELPERS ---
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
}

function toggleLang() {
    LANG = LANG === 'bn' ? 'en' : 'bn';
    localStorage.setItem('hisab_lang', LANG);
    document.documentElement.setAttribute('data-lang', LANG);
    render();
}

function toggleTheme() {
    THEME = THEME === 'dark' ? 'light' : 'dark';
    localStorage.setItem('hisab_theme', THEME);
    document.documentElement.setAttribute('data-theme', THEME);
}

function switchTab(t) {
    TAB = t;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    event.currentTarget.classList.add('on');
    document.querySelectorAll('.sec').forEach(s => s.style.display = 'none');
    document.getElementById('sec-' + t).style.display = 'block';
    render();
}

function setQuickNote(val, id) { document.getElementById(id).value = val; }

function addEntry(type) {
    const p = type === 'receive' ? 'r' : 'g';
    const name = document.getElementById(p + '-n').value.trim();
    const amt = parseFloat(document.getElementById(p + '-a').value);
    const note = document.getElementById(p + '-no').value.trim() || 'Entry';
    if(!name || isNaN(amt)) return alert("Enter valid data!");
    
    let person = DB[type].find(x => x.name.toLowerCase() === name.toLowerCase());
    const hist = { id: Date.now(), date: new Date().toLocaleDateString(), amt, note, t: 'add' };
    if(person) { person.original += amt; person.remaining += amt; person.history.unshift(hist); }
    else { DB[type].push({ id: Date.now(), name, original: amt, remaining: amt, history: [hist] }); }
    
    document.getElementById(p+'-n').value=''; document.getElementById(p+'-a').value=''; document.getElementById(p+'-no').value='';
    save(); render();
}

function openPay(type, id) {
    const p = DB[type].find(x => x.id === id);
    CTX = {type, id};
    document.getElementById('m-pay-sub').textContent = p.name + " - Due: ৳" + p.remaining;
    document.getElementById('m-pay').classList.add('on');
}
function confirmPay() {
    const amt = parseFloat(document.getElementById('pa').value);
    const note = document.getElementById('pn').value || 'Payment';
    if(isNaN(amt) || amt <= 0) return;
    const p = DB[CTX.type].find(x => x.id === CTX.id);
    p.remaining = Math.max(0, p.remaining - amt);
    p.history.unshift({ id: Date.now(), date: new Date().toLocaleDateString(), amt, note, t: 'pay' });
    cm('m-pay'); save(); render();
}

function openAddMore(type, id) {
    const p = DB[type].find(x => x.id === id);
    CTX = {type, id};
    document.getElementById('m-add-sub').textContent = p.name + " - Current: ৳" + p.remaining;
    document.getElementById('m-add').classList.add('on');
}
function confirmAddMore() {
    const amt = parseFloat(document.getElementById('aa').value);
    const note = document.getElementById('an').value || 'Added';
    if(isNaN(amt) || amt <= 0) return;
    const p = DB[CTX.type].find(x => x.id === CTX.id);
    p.original += amt; p.remaining += amt;
    p.history.unshift({ id: Date.now(), date: new Date().toLocaleDateString(), amt, note, t: 'add' });
    cm('m-add'); save(); render();
}

function deleteEntry(type, id) {
    if(confirm("Confirm Delete?")) { DB[type] = DB[type].filter(x => x.id !== id); save(); render(); }
}

function cm(id) { document.getElementById(id).classList.remove('on'); }

function renderCard(p, type) {
    return `<div class="pcard">
        <div class="pt" onclick="this.nextElementSibling.classList.toggle('on')">
            <div class="pname">${p.name}</div>
            <div class="pamount" style="color:var(--${type==='receive'?'green':'red'})">৳${p.remaining}</div>
        </div>
        <div class="pbody">
            <div style="font-weight:700; font-size:11px; color:var(--muted); margin-bottom:8px;">HISTORY:</div>
            ${p.history.map(h => `<div class="hi"><span>${h.date} - ${h.note}</span><b>${h.t==='add'?'+':'-'} ৳${h.amt}</b></div>`).join('')}
            <div class="arow">
                <button class="btn-act" onclick="openPay('${type}', ${p.id})">💸 <span class="bn">পরিশোধ</span><span class="en">Pay</span></button>
                <button class="btn-act" onclick="openAddMore('${type}', ${p.id})">➕ <span class="bn">যোগ</span><span class="en">Add</span></button>
                <button class="btn-act" style="color:var(--red); border-color:var(--red); flex:0.4" onclick="deleteEntry('${type}', ${p.id})">🗑️</button>
            </div>
        </div>
    </div>`;
}

function render() {
    const tr = DB.receive.reduce((s,p) => s + p.remaining, 0);
    const tg = DB.give.reduce((s,p) => s + p.remaining, 0);
    document.getElementById('sv-r').textContent = '৳' + tr;
    document.getElementById('sv-g').textContent = '৳' + tg;
    document.getElementById('sv-n').textContent = '৳' + Math.abs(tr - tg);

    // Filter Top 3 for main tabs (Sorted by highest remaining amount)
    const topR = [...DB.receive].sort((a,b) => b.remaining - a.remaining).slice(0,3);
    const topG = [...DB.give].sort((a,b) => b.remaining - a.remaining).slice(0,3);

    document.getElementById('lst-r').innerHTML = topR.map(p => renderCard(p, 'receive')).join('');
    document.getElementById('lst-g').innerHTML = topG.map(p => renderCard(p, 'give')).join('');

    if(TAB === 'a') {
        const all = [...DB.receive.map(p=>({...p,t:'receive'})), ...DB.give.map(p=>({...p,t:'give'}))].sort((a,b)=>b.id-a.id);
        document.getElementById('lst-a').innerHTML = all.length ? 
            all.map(p => renderCard(p, p.t)).join('') : 
            '<p style="text-align:center; padding:30px; opacity:0.5;">No records found</p>';
    }
}

function exportData() {
    const blob = new Blob([JSON.stringify(DB)], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "hisab_backup.json"; a.click();
}
function triggerImport() { document.getElementById('importFile').click(); }
function handleImport(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { DB = JSON.parse(ev.target.result); save(); render(); };
    reader.readAsText(e.target.files[0]);
}

cloudLoad();
</script>
</body>
</html>
